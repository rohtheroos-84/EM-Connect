<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Background -->
  <rect width="256" height="256" fill="#F0F0F0"/>
  
  <!-- Bauhaus geometric design -->
  <!-- Red square (top-left) -->
  <rect x="20" y="20" width="80" height="80" fill="#D02020"/>
  
  <!-- Blue circle (top-right) -->
  <circle cx="192" cy="68" r="50" fill="#1040C0"/>
  
  <!-- Yellow rectangle (bottom-left) -->
  <rect x="20" y="156" width="100" height="60" fill="#F0C020"/>
  
  <!-- Black accent bar (vertical - right side) -->
  <rect x="210" y="100" width="26" height="120" fill="#121212"/>
  
  <!-- Small red accent (bottom-right) -->
  <rect x="156" y="196" width="70" height="45" fill="#D02020"/>
</svg>
